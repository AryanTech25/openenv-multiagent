# Llama 2 Worker Configuration

llm:
  # Model settings
  model_name: "meta-llama/Llama-2-7b-hf"
  device: "cuda"  # "cuda" or "cpu"
  
  # Optimization
  use_8bit: true                    # 8-bit quantization (saves 75% memory)
  use_flash_attention: true         # Flash attention (2-3x faster)
  
  # Generation
  max_tokens: 512                   # Maximum output length
  temperature: 0.7                  # Randomness (0.0-1.0, higher = more random)
  top_p: 0.9                        # Nucleus sampling threshold

worker_pool:
  # Pool settings
  num_workers: 4                    # Number of workers
  skill_level_range: [0.3, 1.0]    # Min and max skill levels

generation:
  # Generation settings
  timeout_seconds: 30               # Timeout for generation
  retry_attempts: 3                 # Retry attempts on failure
  cache_outputs: true               # Cache generated outputs

failure_injection:
  # Failure mode probabilities
  hallucination_probability: 0.4    # Subtle errors in output
  off_task_probability: 0.3         # Unrelated output
  incomplete_probability: 0.3       # Partial output

logging:
  # Logging settings
  level: "INFO"                     # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/llm_workers.log"

performance:
  # Performance tuning
  batch_size: 1                     # Batch size for generation
  num_threads: 4                    # Number of threads
  use_gpu: true                     # Use GPU if available
  mixed_precision: "fp16"           # fp16 or fp32

deployment:
  # Deployment settings
  model_cache_dir: "./models"       # Where to cache models
  hf_token_env_var: "HF_TOKEN"      # Environment variable for HF token
  auto_download: true               # Auto-download model if not cached
